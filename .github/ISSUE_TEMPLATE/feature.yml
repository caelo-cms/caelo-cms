name: Feature request
description: Suggest something Caelo should do
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Before filing — Caelo is opinionated about what belongs in core vs. plugins.
        Many feature requests are better solved as a **Tier 2 plugin** authored via
        the live-edit chat. See `CONTRIBUTING.md` for the plugin authoring path.
  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: Describe the actual user need, not a proposed solution.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution (optional)
      description: If you have a specific idea, share it. Otherwise leave blank — we may have a different shape in mind.
  - type: dropdown
    id: layer
    attributes:
      label: Which layer would this affect?
      description: See `ARCHITECTURE.md` for the layered permission model.
      options:
        - Core (Module / Template / Page / Snapshot / Deploy / Plugin host)
        - Tier 1 plugin (in-process, signed)
        - Tier 2 plugin (sandboxed, AI-authorable)
        - Admin UI / live-edit overlay
        - Provisioning (Pulumi adapters)
        - MCP / external integrations
        - Documentation / docs site
        - Not sure
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives you've considered
      description: Existing plugins, workflows, or workarounds that almost-solve this.
