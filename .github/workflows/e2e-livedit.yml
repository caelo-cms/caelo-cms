name: E2E Live Edit (real AI)

# Issue #47 — drives the editor chat against the real Anthropic API
# (Sonnet 5, adaptive thinking) so the regression classes the mock-AI
# suite cannot catch (empty AI turns, orphan locks, missing primers)
# get caught. Real cost is the cost of correctness per the operator
# direction in the issue; no schedule, no label gating, no cost guard.
#
# NOTE: this ran on every PR until the #315 regression made it
# permanently red — see the trigger block below for the current scope
# and the condition for restoring PR gating.
#
# PR #61 follow-up: switched from Sonnet 4.6 to Opus 4.7. Sonnet was
# tripping ~4/6 scenarios on AI-variance failures; with Opus, any
# remaining red is a real bug (prompt, code, process) not model
# planning variance. Revisit the model choice once the suite has been
# stable for a few weeks. Model is pinned in
# `apps/admin/playwright.livedit.config.ts:E2E_LIVEDIT_MODEL`.
#
# Cost-metric follow-up: the `Capture real AI cost from ai_calls` step
# dumps the run's real spend (SUM of cost_estimate_microcents, tokens,
# per-model breakdown, unpriced-call count) to
# `apps/admin/test-results/livedit/ai-cost.json`. It surfaces three
# ways: (1) a greppable `e2e-livedit-cost …` line in the run summary +
# a `::notice`, (2) an always()-uploaded `e2e-livedit-cost-<run_id>`
# artifact (90-day retention) as the durable per-run record, and (3) a
# `### Real AI cost (this run)` section in the sticky PR comment via
# build-stats.ts. This is the per-run optimization metric requested by
# the operator; it became meaningful once #297 fixed the missing
# ai_pricing row that had been zeroing cost_estimate_microcents.

# TEMPORARILY OFF FOR PULL REQUESTS (operator direction).
#
# The `pull_request` trigger is removed, NOT the suite. Why: the suite has been
# red on main since 3d887147 (#315) — `scenario-extract-fields` fails because
# minted module fields carry no `default`. That is a real regression, but until
# it is fixed the job contributes no signal to a PR (it is red no matter what
# the PR changes) while costing a live-API run per push and training everyone to
# merge through a red check. A check that is always red is a check nobody reads.
#
# Still runs: on push to main (so the regression stays visible and the cost
# metric keeps recording), and on demand via workflow_dispatch — use that to
# validate an AI-path change on a branch before merging.
#
# Restore the `pull_request:` trigger once #315's regression is fixed and the
# suite is green on main. It is the only thing that catches the classes the
# mock-AI suite cannot (empty AI turns, orphan locks, schema drift, missing
# primers) — see CLAUDE.md §6 and docs/internal/e2e-livedit.md.
on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  # A `git push` to a PR branch supersedes the prior run — cancel the
  # in-flight job so a fast push iteration doesn't queue a stale run.
  # Push-to-main keeps cancel-in-progress = false so a main-bound run
  # is never interrupted.
  group: e2e-livedit-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  # See ci.yml — Node 24 advisory shim until action authors update.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  # Gate the suite on secret presence. Without ANTHROPIC_API_KEY_E2E the
  # global-setup throws loudly (AC #8) — correct behaviour locally, but
  # in CI it would block every PR before an operator has had a chance
  # to add the secret. This preflight job emits `enabled=true` only when
  # the secret is non-empty; the suite job conditions its `if:` on that
  # output, so the missing-secret case shows up as a clean SKIPPED
  # check rather than a FAILURE.
  preflight:
    name: Preflight (secret check)
    # No GITHUB_TOKEN access needed: this job only tests a secret env var
    # and writes a step output.
    permissions: {}
    runs-on: ubuntu-latest
    timeout-minutes: 1
    outputs:
      enabled: ${{ steps.check.outputs.enabled }}
    env:
      # Secrets cannot be referenced inside `if:` expressions; pipe
      # into env, then test the env var in the script.
      ANTHROPIC_API_KEY_E2E: ${{ secrets.ANTHROPIC_API_KEY_E2E }}
    steps:
      - id: check
        run: |
          if [ -n "$ANTHROPIC_API_KEY_E2E" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
            echo "::notice::ANTHROPIC_API_KEY_E2E secret detected; running e2e-livedit suite."
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::notice::ANTHROPIC_API_KEY_E2E secret not configured; skipping e2e-livedit suite. Add the secret in repo Settings → Secrets and variables → Actions to enable it on subsequent runs."
          fi

  e2e-livedit:
    name: Real-AI live-edit scenario
    needs: preflight
    if: needs.preflight.outputs.enabled == 'true'
    runs-on: ubuntu-latest
    # The full chat → Stage → Publish → re-edit loop runs ~5 min per
    # scenario at Opus 4.7 plus compose spin-up + admin build. The
    # suite now runs 6 scenarios (the v0.12 PR added 5 — extract-
    # fields, nested-modules, content-library-shared-edit, placement-
    # sync-toggle, ai-nested-cta — on top of the pre-existing
    # homepage scenario), so the prior 20-min ceiling started timing
    # out runs that were genuinely working. 45 min covers the 6-
    # scenario worst case (~30 min run + ~10 min spin-up + buffer)
    # while still failing a stuck job in bounded time.
    timeout-minutes: 45
    permissions:
      # `contents: write` is required for the "Push screenshots…" step
      # below — it pushes failure screenshots to the `screenshots/
      # e2e-livedit` orphan branch so the PR comment can embed them
      # via raw.githubusercontent.com. Fork PRs get a read-only token
      # regardless of this block (and the test is skipped on forks
      # anyway because the secret isn't injected into fork contexts),
      # so the write privilege is scoped to same-repo branches only.
      contents: write
      pull-requests: write

    env:
      # Compose isolation — the existing `e2e` job in ci.yml may run
      # the same `caelo-postgres` container name on the same runner.
      # A unique project name per run prefixes the container + scopes
      # the network so the two suites can never collide.
      COMPOSE_PROJECT_NAME: caelo-e2e-livedit-${{ github.run_id }}
      POSTGRES_USER: caelo
      POSTGRES_PASSWORD: caelo_ci
      POSTGRES_DB: postgres
      # Host port 5433 to dodge the GHA Postgres service in ci.yml
      # which binds 5432. The compose Postgres still binds 5432
      # inside its network.
      POSTGRES_PORT: 5433
      ADMIN_ROLE_PASSWORD: caelo_admin_ci
      PUBLIC_ROLE_PASSWORD: caelo_public_ci
      ADMIN_DATABASE_URL: postgres://admin_role:caelo_admin_ci@localhost:5433/cms_admin
      PUBLIC_ADMIN_DATABASE_URL: postgres://admin_role:caelo_admin_ci@localhost:5433/cms_public
      PUBLIC_DATABASE_URL: postgres://public_role:caelo_public_ci@localhost:5433/cms_public
      STAGING_PORT: 8081
      PRODUCTION_PORT: 8082
      CAELO_STAGING_BASE_URL: http://localhost:8081
      CAELO_PRODUCTION_BASE_URL: http://localhost:8082

    steps:
      - uses: actions/checkout@v7

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies (frozen lockfile)
        run: bun install --frozen-lockfile

      # Materialise the .env compose reads its POSTGRES_USER/PASSWORD
      # from. Compose's `env_file: .env` directive is mandatory in
      # docker-compose.yml; skipping the write makes Postgres start
      # with no roles.
      - name: Write compose .env
        run: |
          cat > .env <<EOF
          POSTGRES_USER=${POSTGRES_USER}
          POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
          POSTGRES_DB=${POSTGRES_DB}
          ADMIN_ROLE_PASSWORD=${ADMIN_ROLE_PASSWORD}
          PUBLIC_ROLE_PASSWORD=${PUBLIC_ROLE_PASSWORD}
          POSTGRES_PORT=${POSTGRES_PORT}
          STAGING_PORT=${STAGING_PORT}
          PRODUCTION_PORT=${PRODUCTION_PORT}
          EOF

      # Pre-create the static-gen output dirs the Caddy services
      # bind-mount. Without this, Docker creates them at compose-up
      # as root-owned empty dirs, blocking the host-side admin
      # process (running as the runner's user) from writing the
      # generated files.
      - name: Pre-create static-gen output dirs
        run: mkdir -p apps/admin/output/staging apps/admin/output/production

      - name: Start compose (postgres + caddy-staging + caddy-production)
        # `wait` blocks until each service's healthcheck reports healthy.
        # postgres has a healthcheck; the caddy services don't, but
        # they come up in <1s so the wait is effectively just for pg.
        run: docker compose up -d --wait

      - name: Run migrations
        env:
          PGHOST: localhost
        run: bun run db:migrate

      # `@caelo-cms/shared` ships a compiled dist/ — the admin's SSR
      # build can't resolve it otherwise. Same #36/#51 lesson as the
      # `e2e` job in ci.yml.
      - name: Build @caelo-cms/shared (admin SSR dep)
        run: bun run --filter '@caelo-cms/shared' build

      - name: Install Playwright chromium
        run: bun x playwright install chromium --with-deps
        working-directory: apps/admin

      - name: Run e2e-livedit (Scenario 1)
        env:
          ANTHROPIC_API_KEY_E2E: ${{ secrets.ANTHROPIC_API_KEY_E2E }}
        run: bun run e2e-livedit

      # Capture the REAL AI cost of this run from `ai_calls` (operator ask
      # — a per-run cost that can serve as an optimization metric over
      # time). The compose Postgres stays up until the final teardown, so
      # any post-run position works. Every ai_calls row belongs to THIS
      # run (the DB is fresh per job — migrated then seeded+driven by the
      # suite), so no date filter is needed. `unpricedCalls` flags the
      # #297 signature — a missing `ai_pricing` row zeroing an otherwise
      # token-heavy call, which UNDERSTATES the real cost. RLS on
      # `ai_calls` is FORCEd behind a non-empty `caelo.actor_kind` GUC, so
      # we `SET` it in the same session before selecting. `-q` suppresses
      # the `SET` command tag so stdout is pure JSON. `if: always()` so a
      # red suite still records its spend. Never fails the job.
      - name: Capture real AI cost from ai_calls
        if: always()
        env:
          PGHOST: localhost
        run: |
          set -uo pipefail
          OUT_DIR=apps/admin/test-results/livedit
          OUT="${OUT_DIR}/ai-cost.json"
          mkdir -p "${OUT_DIR}"
          PGPASSWORD=${ADMIN_ROLE_PASSWORD} \
            psql "${ADMIN_DATABASE_URL}" -qAtc \
            "SET caelo.actor_kind='system'; SELECT json_build_object('totalMicrocents', COALESCE(SUM(cost_estimate_microcents),0), 'calls', COUNT(*), 'inputTokens', COALESCE(SUM(input_tokens),0), 'outputTokens', COALESCE(SUM(output_tokens),0), 'cachedTokens', COALESCE(SUM(cached_tokens),0), 'unpricedCalls', COUNT(*) FILTER (WHERE cost_estimate_microcents=0 AND (input_tokens>0 OR output_tokens>0)), 'byModel', COALESCE((SELECT json_agg(m) FROM (SELECT model, COUNT(*) AS calls, SUM(cost_estimate_microcents) AS microcents FROM ai_calls GROUP BY model ORDER BY SUM(cost_estimate_microcents) DESC) m), '[]'::json)) FROM ai_calls" \
            > "${OUT}" 2>/dev/null || echo '{}' > "${OUT}"
          # Guard: an empty/whitespace file is as useless as a missing one.
          if [ ! -s "${OUT}" ]; then echo '{}' > "${OUT}"; fi
          echo "ai-cost.json:"; cat "${OUT}"; echo

          # Durable, greppable per-run metric — a future scraper can walk
          # run summaries for `e2e-livedit-cost` to chart spend over time.
          MICRO=$(jq -r '.totalMicrocents // 0' "${OUT}" 2>/dev/null || echo 0)
          CALLS=$(jq -r '.calls // 0' "${OUT}" 2>/dev/null || echo 0)
          TIN=$(jq -r '.inputTokens // 0' "${OUT}" 2>/dev/null || echo 0)
          TOUT=$(jq -r '.outputTokens // 0' "${OUT}" 2>/dev/null || echo 0)
          UNPRICED=$(jq -r '.unpricedCalls // 0' "${OUT}" 2>/dev/null || echo 0)
          USD=$(awk -v m="${MICRO}" 'BEGIN { printf "%.4f", m/100000000 }')
          {
            echo '```'
            echo "e2e-livedit-cost totalUsd=${USD} calls=${CALLS} tokensIn=${TIN} tokensOut=${TOUT} unpriced=${UNPRICED} sha=${GITHUB_SHA}"
            echo '```'
          } >> "${GITHUB_STEP_SUMMARY}"
          echo "::notice title=e2e-livedit cost::\$${USD} (${CALLS} calls)"
          if [ "${UNPRICED}" != "0" ]; then
            echo "::warning title=e2e-livedit cost::${UNPRICED} unpriced ai_calls row(s) — real cost is HIGHER than \$${USD}; add ai_pricing rates."
          fi

      # Durable per-run cost record — the trend metric the operator wants.
      # Separate from the failure-only artifact below: this uploads on
      # every run (green + red) so the metric series has no gaps.
      - name: Upload AI cost metric (always)
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: e2e-livedit-cost-${{ github.run_id }}
          path: apps/admin/test-results/livedit/ai-cost.json
          if-no-files-found: warn
          retention-days: 90

      - name: Dump diagnostic DB tables on failure
        if: failure()
        env:
          PGHOST: localhost
        run: |
          mkdir -p apps/admin/test-results/livedit/db-dump
          for table in chat_messages chat_entity_locks pages page_modules page_module_content; do
            PGPASSWORD=${ADMIN_ROLE_PASSWORD} \
              psql "${ADMIN_DATABASE_URL}" \
              -c "\\COPY (SELECT * FROM ${table}) TO STDOUT WITH CSV HEADER" \
              > apps/admin/test-results/livedit/db-dump/${table}.csv 2>/dev/null || true
          done

      # Dump a directory listing of the static-gen output dirs so we
      # can diagnose publish-side issues (e.g. why production/current
      # is empty) post-hoc. Cheap; no actual files included in the
      # listing — just `find` output. The full output dirs aren't
      # uploaded because they can be sizeable and contain the same
      # HTML the test already exercises via the production fetch.
      - name: Dump static-gen output dir listings on failure
        if: failure()
        run: |
          mkdir -p apps/admin/test-results/livedit/output-listing
          {
            echo "=== staging ===" ;
            find apps/admin/output/staging -maxdepth 5 -printf '%p (%s bytes)\n' 2>/dev/null || true ;
            echo "" ;
            echo "=== production ===" ;
            find apps/admin/output/production -maxdepth 5 -printf '%p (%s bytes)\n' 2>/dev/null || true ;
          } > apps/admin/test-results/livedit/output-listing/find-output.txt
          {
            echo "=== production/current/routing-manifest.json ===" ;
            cat apps/admin/output/production/current/routing-manifest.json 2>/dev/null || echo "(not found)" ;
            echo "" ;
            echo "=== production/current/index.html (first 1000 chars) ===" ;
            head -c 1000 apps/admin/output/production/current/index.html 2>/dev/null || echo "(not found)" ;
          } > apps/admin/test-results/livedit/output-listing/production-current.txt

      - name: Upload artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: e2e-livedit-artifacts-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            apps/admin/test-results/livedit/
          if-no-files-found: warn
          retention-days: 14

      # Push screenshots to a long-lived orphan branch so the PR
      # comment can embed them inline via raw.githubusercontent.com.
      # Collects shots from two sources:
      #   - playwright-report/data/*.png — Playwright's failure
      #     screenshots (one per failing attempt, hashed filename).
      #   - final-state/*.png — explicit page.screenshot() calls
      #     scenarios make at end-of-test, embedded on passing runs.
      # Runs always() so green runs replace the prior sticky comment
      # with their final-state shot.
      - name: Push screenshots to side branch and post PR comment
        if: always() && github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          RUN_ID: ${{ github.run_id }}
          REPO: ${{ github.repository }}
          JOB_STATUS: ${{ job.status }}
        run: |
          set -euo pipefail
          shopt -s nullglob

          FAIL_DIR="apps/admin/test-results/livedit/playwright-report/data"
          FINAL_DIR="apps/admin/test-results/livedit/final-state"
          BRANCH="screenshots/e2e-livedit"
          DEST_REL="pr-${PR_NUMBER}/run-${RUN_ID}"

          FAIL_SHOTS=("${GITHUB_WORKSPACE}/${FAIL_DIR}"/*.png)
          FINAL_SHOTS=("${GITHUB_WORKSPACE}/${FINAL_DIR}"/*.png)

          # Defensive fallback — only fires if both dirs are empty
          # (e.g. the test step never ran). Healthy passing runs always
          # emit a final-state shot; healthy failing runs emit attempt
          # shots; both populate at least one of the two dirs.
          if [ ${#FAIL_SHOTS[@]} -eq 0 ] && [ ${#FINAL_SHOTS[@]} -eq 0 ]; then
            printf '## e2e-livedit run [%s](https://github.com/%s/actions/runs/%s) — %s\n\nNo screenshots were produced.\n' \
              "$RUN_ID" "$REPO" "$RUN_ID" "$JOB_STATUS" > /tmp/e2e-livedit-comment.md
            gh pr comment "$PR_NUMBER" --body-file /tmp/e2e-livedit-comment.md
            exit 0
          fi

          # Push screenshots to the orphan branch. Clone-fresh into a
          # tmp dir so we don't disturb the runner's working tree.
          mkdir -p /tmp/screenshots-wt
          cd /tmp/screenshots-wt

          git init -q
          git remote add origin "https://x-access-token:${GH_TOKEN}@github.com/${REPO}.git"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"

          if git fetch -q origin "$BRANCH" 2>/dev/null; then
            git checkout -q "$BRANCH"
          else
            git checkout -q --orphan "$BRANCH"
            git rm -rfq . 2>/dev/null || true
            printf 'e2e-livedit screenshots — see workflow .github/workflows/e2e-livedit.yml for layout.\n' > README.md
            git add README.md
            git commit -qm "Initialize e2e-livedit screenshots branch"
          fi

          mkdir -p "${DEST_REL}/failure" "${DEST_REL}/final-state"
          for src in "${FAIL_SHOTS[@]}"; do
            cp "$src" "${DEST_REL}/failure/"
          done
          for src in "${FINAL_SHOTS[@]}"; do
            cp "$src" "${DEST_REL}/final-state/"
          done
          git add "$DEST_REL"
          git commit -qm "e2e-livedit: PR #${PR_NUMBER} run ${RUN_ID} screenshots"
          git push -q origin "$BRANCH"

          # PR #61 follow-up — surface the actual error text next to the
          # screenshots, not just a URL. Playwright drops a per-attempt
          # context MD into playwright-report/data/<hash>.md with the
          # test name + the assertion failure + any chat-runner /
          # browser-console errors the fixtures (`fixtures.ts`)
          # collected. Without these, the PR reviewer had to download
          # the artifact bundle to find out *why* a screenshot is red.
          ERR_CONTEXT_DIR="${GITHUB_WORKSPACE}/${FAIL_DIR}"
          ERR_CONTEXT_MDS=("${ERR_CONTEXT_DIR}"/*.md)

          # PR #61 follow-up — `build-stats.ts` parses admin.log +
          # playwright-report.json + ai-cost.json and emits a Real-AI-cost
          # block, an API-stats block, and a per-scenario results table.
          # We splice it in between the screenshots and the error details.
          # Falls through silently if the script errors so a bug here
          # can't block the rest of the comment.
          STATS_FILE=/tmp/e2e-livedit-stats.md
          (
            cd "${GITHUB_WORKSPACE}"
            bun run apps/admin/e2e-livedit/lib/build-stats.ts > "$STATS_FILE"
          ) || echo "_(stats script failed; see workflow logs)_" > "$STATS_FILE"

          {
            printf '## e2e-livedit run [%s](https://github.com/%s/actions/runs/%s) — %s\n\n' \
              "$RUN_ID" "$REPO" "$RUN_ID" "$JOB_STATUS"
            printf 'Screenshots from this run (commit `%s`):\n\n' "${GITHUB_SHA::7}"

            if [ ${#FINAL_SHOTS[@]} -gt 0 ]; then
              printf '### Final state after publish\n\n'
              for src in "${FINAL_SHOTS[@]}"; do
                name=$(basename "$src")
                url="https://raw.githubusercontent.com/${REPO}/${BRANCH}/${DEST_REL}/final-state/${name}"
                printf '![%s](%s)\n\n' "$name" "$url"
              done
            fi

            # Stats block: chat-runner API counters + per-scenario table.
            if [ -s "$STATS_FILE" ]; then
              cat "$STATS_FILE"
              printf '\n'
            fi

            # Group errors by test name so a 3-attempt failure shows
            # under ONE collapsible block, not three. `awk` extracts the
            # `- Name: ` line and the `# Error details` block (between
            # that header and the next `# ` header). Each block is
            # capped at 6000 chars per scenario so a multi-attempt
            # failure doesn't blow past GitHub's 65k-char comment limit.
            if [ ${#ERR_CONTEXT_MDS[@]} -gt 0 ]; then
              printf '### Errors from chat + assertions\n\n'
              printf 'Per-attempt error details captured by the Playwright + chat-runner + console-error trackers (see [`fixtures.ts`](https://github.com/%s/blob/%s/apps/admin/e2e-livedit/fixtures.ts)).\n\n' "$REPO" "${GITHUB_SHA}"
              # Build a tmp file keyed by test name → concatenated errors.
              rm -rf /tmp/e2e-errors && mkdir -p /tmp/e2e-errors
              for md in "${ERR_CONTEXT_MDS[@]}"; do
                test_name=$(awk -F': ' '/^- Name:/ {sub(/^.*>> /, "", $0); sub(/^- Name: /, "", $0); print; exit}' "$md")
                [ -z "$test_name" ] && test_name="(unknown test)"
                # File-name-safe key.
                slug=$(printf '%s' "$test_name" | tr -c '[:alnum:]' '_' | cut -c1-80)
                {
                  printf -- '----- attempt @ %s -----\n' "$(basename "$md" .md | cut -c1-8)"
                  awk '/^# Error details/{flag=1; next} /^# / && flag {exit} flag {print}' "$md"
                } >> "/tmp/e2e-errors/${slug}.txt"
                # Remember pretty name for the slug.
                printf '%s' "$test_name" > "/tmp/e2e-errors/${slug}.name"
              done
              for txt in /tmp/e2e-errors/*.txt; do
                slug=$(basename "$txt" .txt)
                name=$(cat "/tmp/e2e-errors/${slug}.name")
                printf '<details><summary><b>%s</b></summary>\n\n```\n' "$name"
                head -c 6000 "$txt"
                if [ "$(wc -c < "$txt")" -gt 6000 ]; then
                  printf '\n…(truncated; full text in the artifact bundle)\n'
                fi
                printf '\n```\n\n</details>\n\n'
              done
            fi

            if [ ${#FAIL_SHOTS[@]} -gt 0 ]; then
              # PR #61 follow-up — DON'T number these globally. Pre-fix
              # the comment showed e.g. "Attempt 1" through "Attempt 8"
              # for 8 PNGs that were actually 4 scenarios × 2 attempts,
              # implying the same scenario retried 8 times. Each PNG is
              # one attempt's failure shot from across the run; the
              # errors block above is where the per-scenario / per-
              # attempt grouping lives.
              printf '### Failure screenshots\n\n'
              printf 'One screenshot per failed attempt across all scenarios. Scenario + attempt grouping is in the **Errors from chat + assertions** block above.\n\n'
              for src in "${FAIL_SHOTS[@]}"; do
                name=$(basename "$src")
                url="https://raw.githubusercontent.com/${REPO}/${BRANCH}/${DEST_REL}/failure/${name}"
                printf '![%s](%s)\n\n' "$name" "$url"
              done
            fi

            printf '_Auto-posted by `.github/workflows/e2e-livedit.yml`. The full Playwright HTML report + admin.log + DB dump are in the run’s artifact bundle._\n'
          } > /tmp/e2e-livedit-comment.md

          cd "$GITHUB_WORKSPACE"
          gh pr comment "$PR_NUMBER" --body-file /tmp/e2e-livedit-comment.md

      - name: Teardown compose
        if: always()
        run: docker compose down --volumes --remove-orphans
