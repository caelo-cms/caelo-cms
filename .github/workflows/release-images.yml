# SPDX-License-Identifier: MPL-2.0
#
# Caelo CMS — release-image workflow.
#
# Builds + publishes the two runtime container images to GHCR on every
# push to main + every tagged release. Signs both images with cosign
# (keyless / OIDC). Single-arch (linux/amd64) for v0.x — every supported
# managed cloud runtime (GCP Cloud Run, AWS Fargate, Azure Container
# Apps) defaults to amd64, and ARM-host operators (Apple Silicon dev,
# Hetzner CAX, Ampere) build locally from the repo. Multi-arch will
# return as a P17.x follow-up once Bun's QEMU SIGILL on arm64 is fixed
# upstream (https://github.com/oven-sh/bun/issues/15044).
#
# Also runs build-only on every pull_request against main + every
# merge_group speculative run (issue #54) — catches Dockerfile
# regressions that the post-merge push trigger only surfaces after they
# ship (the bug class #53 fixed). The push / sign / mirror steps gate
# POSITIVELY on `push || workflow_call || workflow_dispatch` so
# pull_request + merge_group events build the image but never publish
# (no fork-PR-secrets failures, no `gh-readonly-queue/...` unmerged-
# image clutter in registries); the build-push-action's `push:` flag
# follows the same positive condition. The two matrix jobs are also
# required status checks on the `main-protection` ruleset, so a PR
# whose Docker build fails cannot be merged.
#
# CLAUDE.md §11.C: end-users never build these images. They consume
# pre-built mirrors per provider:
#   - GHCR (ghcr.io/caelo-cms/<service>) — canonical, used by Compose.
#   - GCP public AR (europe-west1-docker.pkg.dev/caelo-website/
#     caelo-cms-images/<service>) — Cloud Run rejects ghcr.io directly.
#   - AWS public ECR + Azure ACR will land alongside the P15 cloud
#     adapters; same pattern (workflow pushes once per release; stack
#     references the public URL).

name: release-images

on:
  push:
    branches: [main]
    # P21 ship 1 — `tags: [v*]` removed. Tag releases are now driven by
    # release.yml which calls this workflow via `workflow_call` after
    # the lint/typecheck/test gate passes. That makes the full release
    # atomic: if Docker fails, npm doesn't publish + no GitHub Release
    # is created. Push-to-main still emits :main + :main-<sha7>.
  pull_request:
    branches: [main]
  merge_group:
    # GitHub's native merge queue (when #34 enables it) re-runs required
    # checks on the merge group; without this trigger the new PR gate
    # would silently skip the queue. Zero cost to include now.
  workflow_call:
  workflow_dispatch:

# Required for cosign keyless signing via OIDC.
permissions:
  contents: read
  packages: write
  id-token: write

# A rapid `git push` to a PR branch supersedes the prior build's
# relevance; cancelling the in-flight job saves ~6 min of CI per push.
# Push-to-main builds keep `cancel-in-progress: false` so a release-
# bound build is never interrupted by a follow-up commit.
concurrency:
  group: release-images-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  REGISTRY: ghcr.io
  # Opt every JavaScript-based action into the Node 24 runtime ahead
  # of GitHub's June-2026 cutover. The actions already work fine; a
  # follow-up advisory ("targets Node 20 but being forced to run on
  # Node 24") will keep printing until docker/* + google-github-actions/
  # auth ship action.yml updates with `runs.using: node24`. Bump those
  # pins when their next majors land — the warning vanishes then.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  IMAGE_NAMESPACE: caelo-cms

jobs:
  build:
    name: build + push (${{ matrix.service }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - service: admin
            dockerfile: apps/admin/Dockerfile
          - service: gateway
            dockerfile: apps/api-gateway/Dockerfile

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        if: github.event_name == 'push' || github.event_name == 'workflow_call' || github.event_name == 'workflow_dispatch'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags + labels
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ matrix.service }}
          tags: |
            # tag-builds → semver tags (v0.1.2 → 0.1.2 + 0.1 + latest)
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern=latest
            # main-branch builds → :main + :main-<sha7>
            type=ref,event=branch
            type=sha,format=short,prefix=main-,enable=${{ github.ref == 'refs/heads/main' }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.url=https://caelo-cms.com
            org.opencontainers.image.licenses=MPL-2.0
            org.opencontainers.image.title=Caelo CMS — ${{ matrix.service }}
            org.opencontainers.image.description=AI-first, open-source CMS — ${{ matrix.service }} runtime image

      - name: Build + push
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64
          # PRs + merge-queue speculative runs build the image but do not
          # push. Only push (to main), workflow_call (from release.yml on
          # tag), and workflow_dispatch (manual) publish — listing those
          # positively means a future event type added by GitHub defaults
          # to build-only, not publish (so we never accidentally publish
          # unmerged or read-only-queue images).
          push: ${{ github.event_name == 'push' || github.event_name == 'workflow_call' || github.event_name == 'workflow_dispatch' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,scope=${{ matrix.service }},mode=max
          provenance: true
          sbom: true

      - name: Install cosign
        if: github.event_name == 'push' || github.event_name == 'workflow_call' || github.event_name == 'workflow_dispatch'
        uses: sigstore/cosign-installer@v3

      - name: Sign image with cosign (keyless / OIDC)
        if: github.event_name == 'push' || github.event_name == 'workflow_call' || github.event_name == 'workflow_dispatch'
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
          TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          # Sign each tag's image digest. Cosign uses GitHub OIDC →
          # Sigstore Fulcio; verifiers check that the cert was issued
          # to this exact GitHub workflow + repo.
          for tag in $(echo "${TAGS}" | tr ',' ' '); do
            cosign sign --yes "${tag}@${DIGEST}"
          done

      - name: Verify the signed image (sanity check)
        if: github.event_name == 'push' || github.event_name == 'workflow_call' || github.event_name == 'workflow_dispatch'
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
          IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ matrix.service }}
        run: |
          cosign verify "${IMAGE}@${DIGEST}" \
            --certificate-identity-regexp="https://github.com/${{ github.repository }}/.github/workflows/release-images.yml@.*" \
            --certificate-oidc-issuer="https://token.actions.githubusercontent.com"

      # ──────────────────────────────────────────────────────────────
      # GCP public AR mirror — Cloud Run accepts *.docker.pkg.dev only.
      # Skipped if no WIF credential is configured (forks / first-run
      # before Caelo team sets up the mirror project).
      # ──────────────────────────────────────────────────────────────
      - name: Authenticate to GCP via Workload Identity Federation
        if: (github.event_name == 'push' || github.event_name == 'workflow_call' || github.event_name == 'workflow_dispatch') && vars.GCP_PUBLIC_REGISTRY_WIF_PROVIDER != ''
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ vars.GCP_PUBLIC_REGISTRY_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_PUBLIC_REGISTRY_SA_EMAIL }}

      - name: Configure docker for GCP AR push
        if: (github.event_name == 'push' || github.event_name == 'workflow_call' || github.event_name == 'workflow_dispatch') && vars.GCP_PUBLIC_REGISTRY_WIF_PROVIDER != ''
        run: gcloud auth configure-docker ${{ vars.GCP_PUBLIC_REGISTRY_REGION || 'europe-west1' }}-docker.pkg.dev --quiet

      - name: Mirror image (+ signatures) to GCP public AR
        if: (github.event_name == 'push' || github.event_name == 'workflow_call' || github.event_name == 'workflow_dispatch') && vars.GCP_PUBLIC_REGISTRY_WIF_PROVIDER != ''
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
          GHCR_IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ matrix.service }}
          AR_REGION: ${{ vars.GCP_PUBLIC_REGISTRY_REGION || 'europe-west1' }}
          AR_PROJECT: ${{ vars.GCP_PUBLIC_REGISTRY_PROJECT || 'caelo-website' }}
          AR_REPO: ${{ vars.GCP_PUBLIC_REGISTRY_REPO || 'caelo-cms-images' }}
        run: |
          # `cosign copy` (NOT `docker pull/tag/push`) so the cosign
          # signature OCI artifact at the source's `<digest>.sig` tag
          # comes along too. The earlier docker-only mirror left the
          # AR images unsigned even though GHCR's copies were signed,
          # which broke `cms-provision upgrade --verify` for end users
          # whose installs pull from AR.
          AR_BASE="${AR_REGION}-docker.pkg.dev/${AR_PROJECT}/${AR_REPO}/${{ matrix.service }}"
          for tag in $(echo "${{ steps.meta.outputs.tags }}" | tr ',' ' '); do
            short_tag="${tag##*:}"
            cosign copy --force "${GHCR_IMAGE}@${DIGEST}" "${AR_BASE}:${short_tag}"
          done
