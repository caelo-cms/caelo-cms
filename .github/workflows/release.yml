# SPDX-License-Identifier: MPL-2.0
#
# Caelo CMS — release workflow.
#
# Fires on `v*` tag push (matching what `bun scripts/release.ts <ver>`
# produces). Publishes every non-private @caelo-cms/* package to npm
# and creates a GitHub Release with the changelog stanza generated by
# the release script.
#
# Docker images are handled separately by `release-images.yml` — that
# workflow already reacts to `v*` tags via docker/metadata-action's
# semver pattern + mirrors GHCR → GCP Artifact Registry. This workflow
# is the npm/release-notes companion.
#
# Pre-release tags (e.g. `v0.6.0-rc.1`) ship to npm under the matching
# dist-tag (`rc`) and are flagged as pre-release in the GitHub UI; they
# do NOT receive `latest` so `bunx @caelo-cms/provisioning` keeps
# pulling the prior stable.
#
# CLAUDE.md §11.C — operators consume pre-built artifacts:
#   - npm: `bunx @caelo-cms/<pkg>`
#   - Docker: `ghcr.io/caelo-cms/<service>:vX.Y.Z`
# Both flow from the same git tag, atomically.

name: release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to publish (e.g. v0.2.0). Must already exist."
        required: true

permissions:
  contents: write    # Needed to create GitHub Releases.
  id-token: write    # Required for npm provenance.

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  # ──────────────────────────────────────────────────────────────────
  # Quality gate — re-run lint + typecheck + test on the tagged commit
  # so a release never ships against a broken HEAD. The standard ci.yml
  # workflow ALSO triggers on tag push (per its `tags: ['v*']` config),
  # but a release shouldn't ship if its own gate goes red — so we
  # re-run the gate here too for atomicity.
  # ──────────────────────────────────────────────────────────────────
  gate:
    name: gate (lint + typecheck + test)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: caelo
          POSTGRES_PASSWORD: caelo_dev
          POSTGRES_DB: postgres
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U caelo"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      ADMIN_DATABASE_URL: postgres://admin_role:caelo_admin_dev@localhost:5432/cms_admin
      PUBLIC_ADMIN_DATABASE_URL: postgres://admin_role:caelo_admin_dev@localhost:5432/cms_public
      PUBLIC_DATABASE_URL: postgres://public_role:caelo_public_dev@localhost:5432/cms_public

    steps:
      - uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Bootstrap databases
        # bootstrap.sh requires POSTGRES_USER + POSTGRES_DB (passed
        # through to `psql --username --dbname`). PGHOST/PGPORT/PGPASSWORD
        # via libpq env. Match ci.yml's pattern exactly.
        env:
          PGHOST: localhost
          PGPORT: 5432
          PGPASSWORD: caelo_dev
          POSTGRES_USER: caelo
          POSTGRES_DB: postgres
          ADMIN_ROLE_PASSWORD: caelo_admin_dev
          PUBLIC_ROLE_PASSWORD: caelo_public_dev
        run: |
          chmod +x packages/migrations/src/bootstrap.sh
          packages/migrations/src/bootstrap.sh

      - name: Sync SvelteKit types
        run: bun run --filter=@caelo-cms/admin sync

      - name: Lint
        run: bun run lint

      - name: Typecheck
        run: bun run typecheck

      - name: Run migrations
        run: bun run db:migrate

      - name: Test
        run: bun run test

      - name: Lockstep version check
        run: bun scripts/release.ts --check

  # ──────────────────────────────────────────────────────────────────
  # Build + push Docker images via the existing release-images workflow,
  # invoked here as a reusable workflow so this release-driver remains
  # the single source of truth for the tag's full publish state.
  # `release-images.yml` no longer fires on `tags: [v*]` directly —
  # it ships only via this `uses:` dispatch + dev-side push-to-main.
  # ──────────────────────────────────────────────────────────────────
  docker:
    name: build + push docker images
    needs: gate
    uses: ./.github/workflows/release-images.yml
    secrets: inherit
    permissions:
      contents: read
      packages: write
      id-token: write

  # ──────────────────────────────────────────────────────────────────
  # Publish each non-private @caelo-cms/* package to npm with
  # provenance attestation. Provenance proves the artifact came from
  # this exact workflow + commit + tag — operators (and `npm audit`)
  # can verify it without trusting registries.
  #
  # Depends on `docker` so a Docker-build failure short-circuits npm
  # publish — atomicity: a v0.5.3 release either ships both registries
  # or neither.
  # ──────────────────────────────────────────────────────────────────
  publish-npm:
    name: publish ${{ matrix.package }} to npm
    needs: [gate, docker]
    runs-on: ubuntu-latest

    strategy:
      fail-fast: true
      # Hardcoded list — these are the packages with `private: false`.
      # Adding a new publishable workspace? Add it here. (A future
      # enhancement: derive this dynamically by walking package.json
      # files at job start. Hardcoded keeps the job idempotent.)
      matrix:
        package:
          # `shared` ships first so `provisioning`'s runtime dep
          # resolves on the registry by the time `bunx
          # @caelo-cms/provisioning` fetches it. Matrix jobs run
          # in parallel by default, but the sequence here is
          # documentation — registry-side ordering is
          # eventually-consistent within a single workflow run.
          - shared
          - mcp-server
          - provisioning

    steps:
      - uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build the package
        run: bun run --filter=@caelo-cms/${{ matrix.package }} build

      - name: Setup Node (for npm publish)
        uses: actions/setup-node@v4
        with:
          # Node 24 ships with npm 11.x natively → no manual upgrade
          # step (which would break npm's in-place self-upgrade by
          # losing the `promise-retry` linkage mid-install). Trusted
          # Publishing requires npm 11.5.1+; Node 24's bundled npm
          # is past that threshold.
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Show npm version (must be 11.5.1+ for Trusted Publishing)
        run: npm --version

      - name: Rewrite workspace deps to lockstep semver
        # Bun's `workspace:*` ref doesn't resolve when consumed via
        # `bunx`/npm — the package manager looks for the dep on the
        # registry, not in a sibling workspace. Lockstep versioning
        # means every workspace package is at the same version, so
        # we rewrite `workspace:*` → `^X.Y.Z` (the current version)
        # in the SHIPPED package.json. The repo copy stays
        # `workspace:*` for local dev. Uses `walk` so the rewrite
        # works regardless of which dependency blocks exist (some
        # packages have no peerDependencies/devDependencies; the
        # earlier per-block expression failed on those).
        working-directory: packages/${{ matrix.package }}
        run: |
          VERSION=$(jq -r .version package.json)
          jq --arg ver "^${VERSION}" '
            walk(if type == "string" and . == "workspace:*" then $ver else . end)
          ' package.json > package.json.tmp
          mv package.json.tmp package.json
          echo "After rewrite:"
          jq '{name, version, dependencies, devDependencies, peerDependencies}' package.json

      - name: Determine npm dist-tag
        id: disttag
        run: |
          # Strip the leading `v` from the tag (or workflow_dispatch input).
          REF="${{ github.event.inputs.tag || github.ref_name }}"
          VERSION="${REF#v}"
          # Pre-releases (containing a hyphen) get a channel-named tag —
          # `0.6.0-rc.1` → tag `rc`. Stable releases get `latest`.
          if [[ "${VERSION}" == *-* ]]; then
            CHANNEL="${VERSION#*-}"
            CHANNEL="${CHANNEL%%.*}"
            echo "tag=${CHANNEL}" >> "${GITHUB_OUTPUT}"
            echo "Publishing ${VERSION} with --tag ${CHANNEL}"
          else
            echo "tag=latest" >> "${GITHUB_OUTPUT}"
            echo "Publishing ${VERSION} with --tag latest"
          fi

      - name: npm publish (Trusted Publishing OIDC + provenance)
        # No NODE_AUTH_TOKEN needed. npm 11.5.1+ exchanges the
        # GitHub OIDC token (id-token: write permission, granted at
        # the workflow root) for a short-lived publish credential
        # AND emits a provenance attestation so downstream consumers
        # can verify the artifact came from this exact workflow.
        # Setup on the npm side is per-package; see RELEASING.md.
        #
        # Wrapped in scripts/npm-publish-idempotent.ts because
        # npm 11.x's --provenance + Trusted Publishing flow can race
        # on a follow-up PUT after the Rekor attestation lands —
        # the package + provenance go live, then a second PUT hits
        # 403 "already published" and the step exits non-zero
        # despite a successful artifact. The wrapper detects that
        # exact failure and verifies the published shasum matches
        # the tarball we just built; if so, treats as idempotent
        # success. See scripts/npm-publish-idempotent.ts header
        # for the full diagnosis (observed on v0.2.3 / provisioning).
        working-directory: packages/${{ matrix.package }}
        run: bun "${GITHUB_WORKSPACE}/scripts/npm-publish-idempotent.ts" --tag "${{ steps.disttag.outputs.tag }}"

  # ──────────────────────────────────────────────────────────────────
  # Verify the published artifacts are actually reachable before
  # creating the GitHub Release. A green tick on the Release page
  # means: gate passed, Docker pushed, npm published, AND end-users
  # can pull both. If verify fails, the GitHub Release isn't created
  # — the tag exists in git but operators won't see "v0.5.3 available"
  # (npm dist-tag rollback is documented in RELEASING.md).
  # ──────────────────────────────────────────────────────────────────
  verify-published:
    name: verify published artifacts
    needs: [docker, publish-npm]
    runs-on: ubuntu-latest

    steps:
      - name: Resolve version
        id: ver
        run: |
          REF="${{ github.event.inputs.tag || github.ref_name }}"
          echo "version=${REF#v}" >> "${GITHUB_OUTPUT}"

      - name: Setup Bun (cms-provision binary's shebang is #!/usr/bin/env bun)
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Verify GHCR images are pullable
        run: |
          for service in admin gateway; do
            IMAGE="ghcr.io/caelo-cms/${service}:${{ steps.ver.outputs.version }}"
            echo "Pulling ${IMAGE}..."
            docker pull "${IMAGE}" || { echo "::error::failed to pull ${IMAGE}"; exit 1; }
          done

      - name: Verify npm packages are installable
        run: |
          for pkg in shared mcp-server provisioning; do
            INSTALL="@caelo-cms/${pkg}@${{ steps.ver.outputs.version }}"
            echo "Inspecting ${INSTALL}..."
            npm view "${INSTALL}" version || { echo "::error::npm view ${INSTALL} failed"; exit 1; }
          done

      - name: Smoke-install + smoke-require published packages
        # Catches what `npm view` can't: broken workspace:* refs,
        # missing dist files, bad bin script paths, ESM/CJS errors
        # at module load. Runs in a clean tmpdir outside the
        # monorepo so workspace resolution can't mask anything.
        run: |
          TMPDIR=$(mktemp -d)
          cd "$TMPDIR"
          npm init -y >/dev/null
          for pkg in shared mcp-server provisioning; do
            INSTALL="@caelo-cms/${pkg}@${{ steps.ver.outputs.version }}"
            echo "::group::install ${INSTALL}"
            npm install --no-save "${INSTALL}" \
              || { echo "::error::smoke install of ${INSTALL} failed"; exit 1; }
            echo "::endgroup::"
          done
          echo "::group::require @caelo-cms/shared"
          node --input-type=module -e "
            import('@caelo-cms/shared').then(m => {
              if (!m.CAELO_VERSION) throw new Error('CAELO_VERSION missing');
              console.log('shared loaded ok, CAELO_VERSION=' + m.CAELO_VERSION);
            }).catch(e => { console.error(e); process.exit(1); });
          "
          echo "::endgroup::"
          echo "::group::cms-provision --version"
          npx --no-install cms-provision --version \
            || { echo "::error::cms-provision --version failed"; exit 1; }
          echo "::endgroup::"

  # ──────────────────────────────────────────────────────────────────
  # Create the GitHub Release with the changelog stanza so operators
  # see the same notes whether they look at npmjs, ghcr.io, or the
  # GitHub Releases page. Depends on verify-published so the Release
  # only appears when ALL artifacts are confirmed reachable.
  # ──────────────────────────────────────────────────────────────────
  github-release:
    name: create GitHub Release
    needs: [gate, publish-npm, verify-published]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0   # need full history for the changelog query

      - name: Extract changelog stanza for this version
        id: changelog
        run: |
          REF="${{ github.event.inputs.tag || github.ref_name }}"
          VERSION="${REF#v}"
          # Pull the `## v<VERSION>` section out of CHANGELOG.md (everything
          # from that heading to the next `## v` heading).
          if [ -f CHANGELOG.md ]; then
            awk -v ver="## v${VERSION}" '
              $0 == ver { in_section = 1; next }
              /^## v/ && in_section { exit }
              in_section { print }
            ' CHANGELOG.md > release-notes.md
          fi
          if [ ! -s release-notes.md ]; then
            echo "Caelo CMS ${REF}" > release-notes.md
            echo "" >> release-notes.md
            echo "_(no changelog stanza — see commits since last tag.)_" >> release-notes.md
          fi
          echo "release-notes-path=release-notes.md" >> "${GITHUB_OUTPUT}"

      - name: Determine pre-release flag
        id: prerelease
        run: |
          REF="${{ github.event.inputs.tag || github.ref_name }}"
          VERSION="${REF#v}"
          if [[ "${VERSION}" == *-* ]]; then
            echo "prerelease=true" >> "${GITHUB_OUTPUT}"
          else
            echo "prerelease=false" >> "${GITHUB_OUTPUT}"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          name: ${{ github.event.inputs.tag || github.ref_name }}
          body_path: ${{ steps.changelog.outputs.release-notes-path }}
          prerelease: ${{ steps.prerelease.outputs.prerelease }}
          generate_release_notes: false
          fail_on_unmatched_files: false
