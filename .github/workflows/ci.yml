name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  # Opt every JavaScript-based action into Node 24 ahead of GitHub's
  # June-2026 cutover. Action authors haven't yet bumped action.yml
  # `runs.using` to `node24`, so the "being forced to run on Node 24"
  # advisory keeps printing. Bump action pins when the next majors
  # ship with native Node 24 support.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  lockfile:
    name: Lockfile freshness
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install without frozen lockfile
        run: bun install

      - name: Assert lockfile is up to date
        run: |
          if ! git diff --exit-code -- bun.lock package.json apps/*/package.json packages/*/package.json; then
            echo ""
            echo "::error::bun.lock is out of date with package.json files."
            echo "::error::Run 'bun install' locally and commit the resulting bun.lock."
            exit 1
          fi

  check:
    name: Lint, Typecheck, Migrate, Test, License
    needs: lockfile
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      POSTGRES_USER: caelo
      POSTGRES_PASSWORD: caelo_ci
      POSTGRES_DB: postgres
      POSTGRES_PORT: 5432
      ADMIN_ROLE_PASSWORD: caelo_admin_ci
      PUBLIC_ROLE_PASSWORD: caelo_public_ci
      ADMIN_DATABASE_URL: postgres://admin_role:caelo_admin_ci@localhost:5432/cms_admin
      PUBLIC_ADMIN_DATABASE_URL: postgres://admin_role:caelo_admin_ci@localhost:5432/cms_public
      PUBLIC_DATABASE_URL: postgres://public_role:caelo_public_ci@localhost:5432/cms_public

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: caelo
          POSTGRES_PASSWORD: caelo_ci
          POSTGRES_DB: postgres
          ADMIN_ROLE_PASSWORD: caelo_admin_ci
          PUBLIC_ROLE_PASSWORD: caelo_public_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U caelo"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies (frozen lockfile)
        run: bun install --frozen-lockfile

      - name: Bootstrap databases (roles + cms_admin + cms_public)
        # Single source of truth: packages/migrations/src/bootstrap.sh. Same script
        # runs under docker-entrypoint-initdb.d on first container boot. libpq
        # picks up PGHOST / PGPASSWORD so TCP vs socket is just env config.
        env:
          PGHOST: localhost
          PGPORT: 5432
          PGPASSWORD: ${{ env.POSTGRES_PASSWORD }}
        run: |
          chmod +x packages/migrations/src/bootstrap.sh
          packages/migrations/src/bootstrap.sh

      - name: Sync SvelteKit types (generates .svelte-kit/types for the admin app)
        run: bun run --filter=@caelo-cms/admin sync

      - name: Lint
        run: bun run lint

      - name: Lockstep version check
        # P20 — every workspace package.json + version.ts must agree.
        # Catches PRs that hand-edit a single package's version field
        # (drift would silently ship). Bumps go through scripts/release.ts.
        run: bun scripts/release.ts --check

      - name: Typecheck
        run: bun run typecheck

      - name: Run migrations
        run: bun run db:migrate

      - name: Test
        # `--isolate` gives each file a fresh global so the per-file
        # Postgres reset in scripts/test-preload.ts fires for every
        # file, preventing cross-file state pollution in the shared
        # cms_admin / cms_public DBs.
        run: bun test --isolate

      - name: License check (MPL-2.0 compatibility)
        run: bun run license:check

  e2e:
    name: Playwright E2E (admin shell smoke)
    needs: check
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Playwright admin shell smoke. Runs against the production build under
    # `vite preview` via the adapter-bun output, matching the configuration
    # that ships. #36 fixed the original SSR module-not-found by building
    # @caelo-cms/shared (the step below); #52 fixed the follow-on Bun /
    # Rollup native-binding SIGILL via two root-cause changes (no
    # job-local workaround): `bunfig.toml` set `linker = "hoisted"`
    # project-wide so Rollup's native binding lands on its resolution path,
    # and `apps/admin/vite.config.ts` externalized `playwright-core` /
    # `@playwright/test` / `@axe-core/playwright` from the SSR build so
    # Vite stops walking those (test-only) trees during `bun run build`.
    # This job is no longer masked — a failure here blocks merging.

    env:
      POSTGRES_USER: caelo
      POSTGRES_PASSWORD: caelo_ci
      POSTGRES_DB: postgres
      POSTGRES_PORT: 5432
      ADMIN_ROLE_PASSWORD: caelo_admin_ci
      PUBLIC_ROLE_PASSWORD: caelo_public_ci
      ADMIN_DATABASE_URL: postgres://admin_role:caelo_admin_ci@localhost:5432/cms_admin
      PUBLIC_ADMIN_DATABASE_URL: postgres://admin_role:caelo_admin_ci@localhost:5432/cms_public
      PUBLIC_DATABASE_URL: postgres://public_role:caelo_public_ci@localhost:5432/cms_public

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: caelo
          POSTGRES_PASSWORD: caelo_ci
          POSTGRES_DB: postgres
          ADMIN_ROLE_PASSWORD: caelo_admin_ci
          PUBLIC_ROLE_PASSWORD: caelo_public_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U caelo"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies (frozen lockfile)
        run: bun install --frozen-lockfile

      # `@caelo-cms/shared` publishes a compiled `dist/` (its package.json
      # `main` points there) and the admin app's Vite SSR build can't
      # resolve it otherwise. Narrowly building only this package — other
      # dist-shipping workspaces (`mcp-server`, `provisioning`) are not on
      # any admin SSR import path, and broadening to `@caelo-cms/*` would
      # also rebuild `@caelo-cms/admin`, duplicating the Vite build that
      # Playwright's webServer runs immediately after.
      # Mirrors the side-effect of `bun run typecheck` in the `check` job.
      - name: Build @caelo-cms/shared (admin SSR dep)
        run: bun run --filter '@caelo-cms/shared' build

      - name: Bootstrap databases
        env:
          PGHOST: localhost
          PGPORT: 5432
          PGPASSWORD: ${{ env.POSTGRES_PASSWORD }}
        run: |
          chmod +x packages/migrations/src/bootstrap.sh
          packages/migrations/src/bootstrap.sh

      - name: Run migrations
        run: bun run db:migrate

      - name: Install Playwright chromium
        run: bun x playwright install chromium --with-deps
        working-directory: apps/admin

      - name: Run Playwright smoke tests
        run: bun run e2e
        working-directory: apps/admin

  admin-prod-image:
    name: Admin production image — boot smoke
    needs: lockfile
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Least-privilege GITHUB_TOKEN scope. The job only checks out the
    # repo, builds the admin image locally, and `docker run`s it — no
    # registry writes, no PR comments, no issue updates. Explicitly
    # scoping to `contents: read` shrinks the blast radius if a
    # transitive third-party action (checkout, setup-buildx,
    # build-push-action) is ever compromised.
    permissions:
      contents: read
    # A rapid `git push` to a PR branch supersedes the prior boot-smoke
    # run's relevance; cancelling the in-flight job saves ~60-90s of CI
    # per push iteration. Push-to-main runs keep `cancel-in-progress:
    # false` so a main-bound build is never interrupted by a follow-up
    # commit. Mirrors release-images.yml's workflow-level pattern.
    concurrency:
      group: admin-prod-image-${{ github.event.pull_request.number || github.ref }}
      cancel-in-progress: ${{ github.event_name == 'pull_request' }}
    # Issue #55 — complements release-images.yml's PR build gate (#54)
    # with a boot smoke. release-images builds + publishes; this job
    # builds the admin image alone (no push, no sign, no mirror) and
    # `docker run`s it to confirm the SvelteKit + adapter-bun server
    # actually boots. The bug class #53 fixed (Cannot find module
    # "oxc-parser") succeeds at Docker build time and only crashes on
    # `docker run` — release-images alone cannot catch it.
    #
    # Fake DB URLs are intentional: the lazy query context
    # (apps/admin/src/lib/server/query.ts) and the `.catch`-wrapped
    # bootstraps in hooks.server.ts mean the server binds PORT without
    # touching the database, so a successful port-bind is a sufficient
    # signal that the JS bundle loaded correctly. MODULE_NOT_FOUND
    # crashes happen at module load BEFORE the port binds and surface
    # here as a never-bound port.

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build admin image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/admin/Dockerfile
          platforms: linux/amd64
          load: true
          push: false
          tags: caelo-admin:smoke
          # Read from BOTH release-images' admin matrix-job cache scope
          # AND this job's own scope. Write only to our own scope so we
          # never thrash release-images' cache. Buildx supports multiple
          # cache-from entries.
          cache-from: |
            type=gha,scope=admin
            type=gha,scope=admin-smoke
          cache-to: type=gha,scope=admin-smoke,mode=max

      - name: Boot smoke (port wait + alive check)
        run: |
          set -euo pipefail

          docker run -d --name smoke -p 3000:3000 \
            -e PORT=3000 \
            -e ORIGIN=http://localhost:3000 \
            -e ADMIN_DATABASE_URL=postgres://nobody:nothing@127.0.0.1:9/nope \
            -e PUBLIC_DATABASE_URL=postgres://nobody:nothing@127.0.0.1:9/nope \
            caelo-admin:smoke

          # Wait up to 30s for any HTTP response on /. A 3-digit status
          # code (even 5xx) means the JS bundle loaded and the listener
          # attached — that's the load-bearing signal.
          start=$SECONDS
          deadline=$((SECONDS + 30))
          connected=0
          while [ $SECONDS -lt $deadline ]; do
            code=$(curl -sS -o /dev/null -w '%{http_code}' --max-time 2 \
              http://localhost:3000/ || true)
            if [ -n "$code" ] && [ "$code" != "000" ]; then
              echo "Boot OK: GET / returned HTTP $code after $((SECONDS - start))s"
              connected=1
              break
            fi
            sleep 1
          done

          if [ "$connected" -ne 1 ]; then
            echo "::error::Admin image did not boot within 30s — likely Cannot-find-module-class regression"
            docker logs smoke || true
            docker rm -f smoke || true
            exit 1
          fi

          # Catches the rare "bound the port then crashed mid-boot" case.
          running=$(docker inspect -f '{{.State.Running}}' smoke)
          if [ "$running" != "true" ]; then
            echo "::error::Admin container exited after binding port"
            docker logs smoke || true
            docker rm -f smoke || true
            exit 1
          fi

          echo "--- container log tail (success path) ---"
          docker logs smoke 2>&1 | head -50 || true
          docker rm -f smoke
