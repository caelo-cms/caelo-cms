name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lockfile:
    name: Lockfile freshness
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Install without frozen lockfile
        run: bun install

      - name: Assert lockfile is up to date
        run: |
          if ! git diff --exit-code -- bun.lock package.json apps/*/package.json packages/*/package.json; then
            echo ""
            echo "::error::bun.lock is out of date with package.json files."
            echo "::error::Run 'bun install' locally and commit the resulting bun.lock."
            exit 1
          fi

  check:
    name: Lint, Typecheck, Migrate, Test, License
    needs: lockfile
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      POSTGRES_USER: caelo
      POSTGRES_PASSWORD: caelo_ci
      POSTGRES_DB: postgres
      POSTGRES_PORT: 5432
      ADMIN_ROLE_PASSWORD: caelo_admin_ci
      PUBLIC_ROLE_PASSWORD: caelo_public_ci
      ADMIN_DATABASE_URL: postgres://admin_role:caelo_admin_ci@localhost:5432/cms_admin
      PUBLIC_ADMIN_DATABASE_URL: postgres://admin_role:caelo_admin_ci@localhost:5432/cms_public
      PUBLIC_DATABASE_URL: postgres://public_role:caelo_public_ci@localhost:5432/cms_public

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: caelo
          POSTGRES_PASSWORD: caelo_ci
          POSTGRES_DB: postgres
          ADMIN_ROLE_PASSWORD: caelo_admin_ci
          PUBLIC_ROLE_PASSWORD: caelo_public_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U caelo"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Install dependencies (frozen lockfile)
        run: bun install --frozen-lockfile

      - name: Bootstrap databases (roles + cms_admin + cms_public)
        run: |
          PGPASSWORD=$POSTGRES_PASSWORD psql -h localhost -U $POSTGRES_USER -d $POSTGRES_DB -v ON_ERROR_STOP=1 -c "
            CREATE ROLE admin_role NOINHERIT LOGIN PASSWORD '$ADMIN_ROLE_PASSWORD';
            CREATE ROLE public_role NOINHERIT LOGIN PASSWORD '$PUBLIC_ROLE_PASSWORD';
            CREATE DATABASE cms_admin OWNER admin_role;
            CREATE DATABASE cms_public OWNER admin_role;
            REVOKE ALL ON DATABASE cms_admin FROM PUBLIC;
            REVOKE ALL ON DATABASE cms_public FROM PUBLIC;
            GRANT CONNECT ON DATABASE cms_admin TO admin_role;
            GRANT CONNECT ON DATABASE cms_public TO public_role, admin_role;
          "

      - name: Lint
        run: bun run lint

      - name: Typecheck
        run: bun run typecheck

      - name: Run migrations
        run: bun run db:migrate

      - name: Test
        run: bun test

      - name: License check (MPL-2.0 compatibility)
        run: bun run license:check
