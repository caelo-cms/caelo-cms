<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex" />
    <link rel="icon" type="image/svg+xml" href="%sveltekit.assets%/favicon.svg" />
    <link rel="apple-touch-icon" href="%sveltekit.assets%/apple-touch-icon.svg" />
    <!--
      v0.2.55 — manifest.json link removed. IAP gates every admin path,
      so the PWA manifest fetch redirects to Google's OAuth endpoint, the
      browser blocks the cross-origin redirect with a CORS error, and
      every admin pageload spams the console with a benign-but-loud
      message. The admin is an authoring tool behind IAP — installable-
      PWA never made sense here. Remove the link, kill the noise.
    -->
    <meta name="theme-color" content="#0f172a" />
    <title>Caelo CMS Admin</title>
    %sveltekit.head%
  </head>
  <body>
    <div id="app">%sveltekit.body%</div>
  </body>
</html>
