# SPDX-License-Identifier: MPL-2.0
#
# Caelo GCP provider stack. Provisions Cloud SQL HA + GCS (media + static
# output) + Cloud CDN + Cloud Run (admin/gateway/orchestrator/runner +
# edge-router) + Secret Manager + Cloud Logging → BigQuery sink for
# A/B assignment logs. Implements the shared CloudAdapterInputs /
# CloudAdapterOutputs contract from packages/provisioning/src/adapter.ts.
name: caelo-gcp
runtime:
  name: nodejs
  options:
    typescript: true
    packagemanager: bun
main: ./index.ts
description: Caelo GCP stack — Cloud SQL HA + GCS + Cloud CDN + Cloud Run + Secret Manager.
config:
  # Required
  caelo-gcp:domain:
    type: string
    description: Primary domain (e.g. example.com).
  caelo-gcp:ownerEmail:
    type: string
    description: Operator email for Pulumi notifications + the default IAP allowlist.
  caelo-gcp:project:
    type: string
    description: GCP project id.
  caelo-gcp:anthropicApiKey:
    type: string
    secret: true
    description: Anthropic API key. Set via `cat key | pulumi config set --secret`.
  # The 8 cross-provider knobs (CLAUDE.md §11.B)
  caelo-gcp:region:
    type: string
    default: us-central1
    description: Primary GCP region (Cloud SQL, Cloud Run, GCS).
  caelo-gcp:cloudSqlTier:
    type: string
    default: db-f1-micro
    description: Cloud SQL machine tier. Default = ~$10/mo (ENTERPRISE edition). Bump for production traffic. ENTERPRISE_PLUS edition requires `db-perf-optimized-N-*` tiers.
  caelo-gcp:cloudSqlEdition:
    type: string
    default: ENTERPRISE
    description: Cloud SQL edition. ENTERPRISE = legacy shared-core tiers (db-f1-micro etc., cheapest). ENTERPRISE_PLUS = sub-second failover + higher IOPS, requires db-perf-optimized-N-* tiers (+~$40/mo floor).
  caelo-gcp:cloudSqlHa:
    type: boolean
    default: false
    description: HA failover (REGIONAL availabilityType). +~$20/mo. Off by default.
  caelo-gcp:adminMinInstances:
    type: string
    default: "0"
    description: Admin Cloud Run min instances. 0 = scale to zero. 1 = no cold start (+~$15/mo).
  caelo-gcp:gatewayMinInstances:
    type: string
    default: "0"
    description: Gateway Cloud Run min instances. 0 = scale to zero. 1 = no cold start (+~$15/mo).
  caelo-gcp:iapAllowlist:
    type: string
    default: ""
    description: Comma-list of IAP principals (e.g. "user:owner@example.com,group:editors@example.com"). Empty = falls back to "user:<ownerEmail>" at runtime.
  caelo-gcp:wafAdaptiveProtection:
    type: boolean
    default: false
    description: Cloud Armor adaptive protection (ML-based bot mitigation). +~$5/mo.
  caelo-gcp:backupRetentionDays:
    type: string
    default: "7"
    description: Cloud SQL backup retention in days. Up to 90.
  caelo-gcp:deletionProtection:
    type: boolean
    default: false
    description: Block `pulumi destroy` on Cloud SQL + Cloud Run. Defaults off for operator-friendly teardown; flip true for production deploys you never want to accidentally destroy.
# Optional config NOT declared above:
#   caelo-gcp:resendApiKey  (secret) — Resend API key for newsletter / auth
#     plugin email transport. Set via `cat key | pulumi config set --secret`.
#     Omit to ship without email transport (plugins log to stderr until wired).
#   caelo-gcp:image-admin / image-gateway — image tags for Cloud Run services.
#     Default `<region>-docker.pkg.dev/<project>/caelo/<service>:latest`.
