services:
  postgres:
    image: postgres:17-alpine
    container_name: caelo-postgres
    environment:
      POSTGRES_USER: caelo
      POSTGRES_PASSWORD: caelo_dev
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U caelo"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
