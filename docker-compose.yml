services:
  postgres:
    image: postgres:17-alpine
    container_name: caelo-postgres
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      ADMIN_ROLE_PASSWORD: ${ADMIN_ROLE_PASSWORD}
      PUBLIC_ROLE_PASSWORD: ${PUBLIC_ROLE_PASSWORD}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # First-run bootstrap: creates admin_role + public_role + cms_admin + cms_public
      # before any migration runs. Executes only when the data volume is empty.
      - ./packages/migrations/src/bootstrap.sh:/docker-entrypoint-initdb.d/01-bootstrap.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # P6 — local serving layer for the static generator's output. Two
  # Caddy vhosts mount the per-env dist directory and serve <slug>/index.html
  # behind clean URLs. Staging adds X-Robots-Tag: noindex per
  # CMS_REQUIREMENTS §16.5 so a misconfigured robots.txt cannot leak.
  # Production passes through to the page's emitted robots.txt.
  # P6.2 — bind-mount the per-env output dir (containing builds/ +
  # current). The Caddyfile reads /srv/current/<request> so the symlink
  # swap takes effect at request time. Bind mounts on macOS Docker
  # Desktop now stay stable across deploys because we never destroy the
  # mounted directory's inode (only the `current` symlink target moves).
  caddy-staging:
    image: caddy:2-alpine
    container_name: caelo-caddy-staging
    ports:
      - "${STAGING_PORT:-8081}:80"
    volumes:
      - ./packages/provisioning/caddy/Caddyfile.staging:/etc/caddy/Caddyfile:ro
      - ./apps/admin/output/staging:/srv:ro

  caddy-production:
    image: caddy:2-alpine
    container_name: caelo-caddy-production
    ports:
      - "${PRODUCTION_PORT:-8082}:80"
    volumes:
      - ./packages/provisioning/caddy/Caddyfile.production:/etc/caddy/Caddyfile:ro
      - ./apps/admin/output/production:/srv:ro

volumes:
  postgres_data:
